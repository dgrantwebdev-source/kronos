name = "kronos"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"

# Environment variables
[vars]
NODE_VERSION = "18"

# Secrets (set via wrangler secret put)
# SUPABASE_URL
# SUPABASE_ANON_KEY
# SUPABASE_SERVICE_ROLE_KEY
# KRONOS_API_KEY_PREFIX

[[d1_databases]]
binding = "DB"
database_name = "kronos"
database_id = ""
